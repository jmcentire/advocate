name: Release validation

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  validate-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test and build tools
        run: python -m pip install --upgrade pip build ".[dev]"

      - name: Run release tests
        run: python -m pytest tests/smoke tests/test_dependency_metadata.py

      - name: Build distribution
        run: python -m build

      - name: Install wheel in an isolated environment
        run: |
          python -m venv /tmp/advocate-release
          /tmp/advocate-release/bin/python -m pip install dist/*.whl

      - name: Import shipped modules and invoke CLI
        run: |
          /tmp/advocate-release/bin/python - <<'PY'
          import importlib
          import pkgutil
          import advocate

          for module in pkgutil.walk_packages(advocate.__path__, "advocate."):
              importlib.import_module(module.name)
          PY
          /tmp/advocate-release/bin/advocate personas
